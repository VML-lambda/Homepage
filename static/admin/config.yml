backend:
  name: github
  repo: VML-lambda/Homepage
  branch: cms-draft
  base_url: https://sveltia-cms-auth.vml-lambda.workers.dev

media_folder: "static/img"
public_folder: "/img"
media_library:
  name: ""
  folder_support: true

collections:

  # ========== Papers ==========
  - name: "publications"
    label: "Papers"
    label_singular: "Papers"
    folder: "content/publications/papers"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "[{{type}}] {{title}} ({{yearMonth}})"
    media_folder: "/static/img/paper"
    public_folder: "/img/paper"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "First Author", name: "firstAuthor", widget: "string" }
      - { label: "Co-authors", name: "coauthors", widget: "string", required: false, hint: "Comma separated. Use &lt;sup&gt;†&lt;/sup&gt; for corresponding author." }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Year.Month", name: "yearMonth", widget: "string", hint: "e.g. 2025.03" }
      - { label: "Type", name: "type", widget: "select", options: ["International", "Domestic"] }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "DOI", name: "doi", widget: "string", required: false }
      - { label: "Research Area", name: "researchArea", widget: "select", multiple: true, options: ["NVC", "VCM", "3DV"], required: false }
      - { label: "Grant", name: "grant", widget: "string", required: false, hint: "관련 과제명" }

  # ========== Standard Contributions ==========
  - name: "contributions"
    label: "Standard Contributions"
    label_singular: "Standard Contributions"
    folder: "content/publications/contributions"
    create: true
    slug: "{{year}}-{{slug}}"
    summary: "[{{type}}] {{title}} ({{yearMonth}})"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "First Author", name: "firstAuthor", widget: "string", required: false }
      - { label: "Organization", name: "organization", widget: "string", default: "ISO/IEC JTC 1" }
      - { label: "Org Name", name: "orgName", widget: "string" }
      - { label: "Meeting Name", name: "meetingName", widget: "string" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Year.Month", name: "yearMonth", widget: "string", hint: "e.g. 2024" }
      - { label: "DOI", name: "doi", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "select", options: ["MPEG", "JVET", "JPEG"] }
      - { label: "Research Area", name: "researchArea", widget: "select", multiple: true, options: ["NVC", "VCM", "3DV"], required: false }
      - { label: "Grant", name: "grant", widget: "string", required: false }

  # ========== Notices ==========
  - name: "notices"
    label: "Notices"
    label_singular: "Notices"
    folder: "content/notices"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{date}})"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "예: [Hot!] [2026 학부연구생 모집] 접수기간: ~25/12/31" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ========== News ==========
  - name: "news"
    label: "News"
    label_singular: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{date}})"
    media_folder: "/static/img/project"
    public_folder: "/img/project"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Category", name: "category", widget: "select", options: ["accept", "award", "event", "notice"], required: false }
      - { label: "Label", name: "label", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Image Style", name: "image_style", widget: "string", required: false, default: "height:200px" }
      - { label: "Show on Home", name: "showhome", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  # ========== Students ==========
  - name: "members-students"
    label: "Students"
    label_singular: "Students"
    folder: "content/members/students"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{degree}})"
    media_folder: "/static/img/people"
    public_folder: "/img/people"
    fields:
      - { label: "Name (English)", name: "title", widget: "string" }
      - { label: "Name (Korean)", name: "korName", widget: "string", required: false }
      - { label: "Degree", name: "degree", widget: "select", options: ["PhD", "MS", "Intern"] }
      - { label: "Position", name: "position", widget: "string", required: false, hint: "e.g. Lab Leader / FCM (PL)" }
      - { label: "Department", name: "department", widget: "string", default: "Computer Science and Engineering", required: false }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", default: "profile.png" }
      - { label: "Display Order", name: "weight", widget: "number", value_type: "int", default: 99 }
      - { label: "Research Interests", name: "researchInterests", widget: "list", required: false }
      - { label: "Education", name: "education", widget: "list", required: false }
      - { label: "GitHub", name: "github", widget: "string", required: false }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Homepage", name: "homepage", widget: "string", required: false }
      - { label: "ORCID", name: "orcid", widget: "string", required: false }
      - { label: "CV", name: "cv", widget: "string", required: false }

  # ========== Alumni ==========
  - name: "members-alumni"
    label: "Alumni"
    label_singular: "Alumni"
    folder: "content/members/alumni"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{degree}})"
    media_folder: "/static/img/people"
    public_folder: "/img/people"
    fields:
      - { label: "Name (English)", name: "title", widget: "string" }
      - { label: "Name (Korean)", name: "korName", widget: "string", required: false }
      - { label: "Degree", name: "degree", widget: "select", options: ["MS", "Intern"] }
      - { label: "Position", name: "position", widget: "string", required: false }
      - { label: "Department", name: "department", widget: "string", default: "Computer Science and Engineering", required: false }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", default: "profile.png" }
      - { label: "Display Order", name: "weight", widget: "number", value_type: "int" }
      - { label: "Current (present job/school)", name: "current", widget: "string", required: false }

  # ========== Gallery ==========
  - name: "gallery"
    label: "Gallery"
    label_singular: "Gallery"
    folder: "content/gallery"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{date}})"
    media_folder: "/static/img/gallery"
    public_folder: "/img/gallery"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date (시작일)", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Date End (종료일, 기간인 경우만)", name: "date_end", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: "Images"
        name: "images"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }

  # ========== Professor ==========
  - name: "professor"
    label: "Professor"
    files:
      - name: "professor-profile"
        label: "Professor Profile"
        file: "content/members/professor/_index.md"
        media_folder: "/static/img/people"
        public_folder: "/img/people"
        fields:
          - { label: "Name (English)", name: "title", widget: "string" }
          - { label: "Name (Korean)", name: "korName", widget: "string" }
          - { label: "Name (Hanja)", name: "hanjaName", widget: "string", required: false }
          - { label: "Position", name: "position", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Room", name: "room", widget: "string" }
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Bio (English)", name: "body", widget: "markdown" }
          - { label: "Lectures (담당 교과)", name: "lectures", widget: "markdown" }
          - { label: "Education (학력)", name: "education", widget: "markdown" }
          - { label: "Work Experience (경력)", name: "experience", widget: "markdown" }
          - { label: "Community Service (대외 활동)", name: "service", widget: "markdown" }
          - { label: "Awards (수상)", name: "awards", widget: "markdown" }
          - { label: "On the Media (언론 기사)", name: "media_links", widget: "markdown" }
          - { label: "Standard Patents & Tech Transfer", name: "patents_std", widget: "markdown" }
          - { label: "International Patents (국제특허)", name: "patents_intl", widget: "markdown" }
          - { label: "Domestic Patents (국내특허)", name: "patents_domestic", widget: "markdown" }

  # ========== Research ==========
  - name: "research"
    label: "Research"
    label_singular: "Research Category"
    folder: "content/research"
    create: true
    slug: "{{slug}}"
    summary: "[{{focusNumber}}] {{title}}"
    media_folder: "/static/img/about"
    public_folder: "/img/about"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g. Neural Image & Video Coding" }
      - { label: "Short Name", name: "shortName", widget: "string", hint: "e.g. NVC" }
      - { label: "Subtitle", name: "subtitle", widget: "string", hint: "한 줄 설명" }
      - { label: "Focus Number", name: "focusNumber", widget: "string", hint: "e.g. 01" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Display Order", name: "weight", widget: "number", value_type: "int" }
      - { label: "Overview (본문)", name: "body", widget: "markdown", hint: "연구 목적, 중요성, 활용 분야 소개" }
      - { label: "Team Lead", name: "teamLead", widget: "string", required: false }
      - label: "Team Members"
        name: "teamMembers"
        widget: "list"
        required: false
        field: { label: "Name", name: "name", widget: "string" }
      - label: "Research Highlights"
        name: "highlights"
        widget: "list"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Period", name: "period", widget: "string", hint: "e.g. 2023-2025" }
          - { label: "Description", name: "description", widget: "markdown", hint: "핵심 아이디어, 목표, 결과를 홍보 스타일로 작성" }
          - { label: "Key Figure", name: "keyFigure", widget: "image", required: false }
          - { label: "Key Result", name: "keyResult", widget: "string", required: false, hint: "e.g. CVPR 2026 발표, MPEG 표준 채택" }
          - { label: "Participants", name: "participants", widget: "string", required: false }
          - label: "Related Links"
            name: "relatedLinks"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Paper, Grant, Standard" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string", required: false }

  # ========== Grants ==========
  - name: "grants"
    label: "Grants"
    label_singular: "Grants"
    folder: "content/grants"
    create: true
    slug: "{{slug}}"
    summary: "[{{status}}] {{title}}"
    media_folder: "/static/img/other-logos"
    public_folder: "/img/other-logos"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Title (Korean)", name: "title_small", widget: "string", required: false }
      - { label: "Organization", name: "organization", widget: "string" }
      - { label: "Logo Image", name: "img_url", widget: "image", required: false }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Date Range", name: "date_range", widget: "string", hint: "e.g. Jun. 2025 - May 2028" }
      - { label: "Status", name: "status", widget: "select", options: ["Ongoing", "Completed"] }
      - { label: "Display Order", name: "weight", widget: "number", value_type: "int" }
      - { label: "Research Area", name: "researchArea", widget: "select", multiple: true, options: ["NVC", "VCM", "3DV"], required: false }
