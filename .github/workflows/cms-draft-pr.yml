name: Create PR from cms-draft

on:
  push:
    branches:
      - cms-draft

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR cms-draft → master if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list --repo ${{ github.repository }} --base master --head cms-draft --state open --json number --jq length)
          if [ "$OPEN" = "0" ]; then
            PR_URL=$(gh pr create \
              --repo ${{ github.repository }} \
              --base master \
              --head cms-draft \
              --title "merge: CMS updates" \
              --body "CMS changes ready for review. Please squash-merge after review and delete the branch." \
              --label cms-draft)
            gh pr edit "$PR_URL" --add-reviewer rollingman1 || echo "Warning: could not add reviewer rollingman1"
            gh pr edit "$PR_URL" --add-reviewer jsk0910 || echo "Warning: could not add reviewer jsk0910"
          fi
