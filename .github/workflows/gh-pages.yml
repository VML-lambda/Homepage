name: Deploy Hugo site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# TODO: Node.js 20 deprecation (2026-06-02 이후 Node 24 강제 전환 예정)
# 안정화되면 아래 주석 해제
# env:
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#
# 현재 peaceiris/actions-hugo@v3가 node20 런타임을 사용 중 (확인됨).
# 메인테이너가 Node 24 대응 버전을 아직 릴리스하지 않아,
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true 설정 시 Hugo 설치 단계가 실패할 수 있음.
# peaceiris/actions-hugo에 Node 24 대응 릴리스가 나오면 버전 업그레이드로 해결 권장.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.157.0"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-cms-draft:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync master to cms-draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin cms-draft; then
            echo "cms-draft exists"
            git checkout cms-draft
            git merge origin/master --no-edit || true
            git push origin cms-draft
          else
            echo "cms-draft does not exist, create from master"
            git checkout -b cms-draft origin/master
            git push -u origin cms-draft
          fi
