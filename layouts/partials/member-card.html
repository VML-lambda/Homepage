<div class="col-lg-3 col-md-4 col-sm-6 wow fadeIn" data-wow-delay="0.1s">
  <div class="team-item rounded overflow-hidden text-center p-4">
    <img class="img-fluid rounded-circle mb-3"
         src="/img/people/{{ .Params.image | default "profile.png" }}"
         alt="{{ .Title }}"
         style="width:120px;height:120px;object-fit:cover;"
         onerror="this.src='/img/people/profile.png'">
    <h5>{{ .Title }}</h5>
    <p class="text-primary mb-1">{{ .Params.korName }}</p>
    <p class="text-muted small mb-2">{{ .Params.position }}</p>
    {{ if .Params.email }}
    <a href="mailto:{{ .Params.email }}" class="btn btn-sm btn-outline-primary me-1"><i class="fas fa-envelope"></i></a>
    {{ end }}
    {{ if .Params.github }}
    <a href="{{ .Params.github }}" target="_blank" class="btn btn-sm btn-outline-primary me-1"><i class="fab fa-github"></i></a>
    {{ end }}
    {{ if .Params.linkedin }}
    <a href="{{ .Params.linkedin }}" target="_blank" class="btn btn-sm btn-outline-primary me-1"><i class="fab fa-linkedin-in"></i></a>
    {{ end }}
    {{ if .Params.orcid }}
    <a href="{{ .Params.orcid }}" target="_blank" class="btn btn-sm btn-outline-primary me-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="0.875em" height="0.875em" style="vertical-align:-0.125em"><path d="M256 128c0 70.7-57.3 128-128 128S0 198.7 0 128 57.3 0 128 0s128 57.3 128 128z" fill="currentColor"/><path d="M86.3 186.2H70.9V79.1h15.4v107.1zM108.9 79.1h41.6c39.6 0 57 28.3 57 53.6 0 27.5-21.5 53.6-56.8 53.6h-41.8V79.1zm15.4 93.3h24.5c34.9 0 42.9-26.5 42.9-39.7C191.7 111.2 178 93 148 93h-23.7v79.4zM88.7 56.8c0 5.5-4.5 10.1-10.1 10.1s-10.1-4.6-10.1-10.1c0-5.6 4.5-10.1 10.1-10.1s10.1 4.5 10.1 10.1z" fill="#fff"/></svg></a>
    {{ end }}
    {{ if .Params.cv }}
    <a href="{{ .Params.cv }}" target="_blank" class="btn btn-sm btn-outline-primary me-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 16" width="1.4em" height="0.875em" style="vertical-align:-0.125em"><text x="16" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="900" fill="currentColor">CV</text></svg></a>
    {{ end }}
    {{ if .Params.homepage }}
    <a href="{{ .Params.homepage }}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="fas fa-home"></i></a>
    {{ end }}
  </div>
</div>
